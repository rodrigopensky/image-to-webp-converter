<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to WebP Converter</title>

<meta name="description" content="Convert images to WebP instantly in your browser. Fast, private and free.">
<meta name="author" content="Rodrigo Miranda">

<!-- Bootstrap 5.3.3 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<header class="py-4 text-center bg-white shadow-sm">
    <div class="container">
        <h1 class="h3">🖼️ Image to WebP Converter</h1>
        <p class="text-muted mb-0">Drag & Drop or Upload Images to Convert</p>
    </div>
</header>

<main class="container my-5 flex-grow-1">

    <div class="row justify-content-center">
        <div class="col-12">

            <div class="card shadow-sm p-4">

                <input 
                    type="file"
                    id="fileSelector"
                    class="form-control mb-3"
                    multiple
                    accept="image/*"
                >

                <div 
                    id="dropTarget"
                    class="border border-2 border-dashed rounded p-5 text-center bg-light"
                >
                    <div id="previewContainer" class="row g-3 mt-3 justify-content-center"></div>
                    <span class="text-muted">Drop images here</span>
                </div>

            </div>

        </div>
    </div>

</main>

<footer class="bg-white py-3 text-center border-top mt-auto">
    <div class="container">
        <p class="mb-0 text-muted">
            Open Source Tool • Built with JavaScript
        </p>
    </div>
</footer>

<script src="assets/js/converter.js"></script>

</body>
</html>
